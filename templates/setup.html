<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOTP Kurulum</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top left, #1f2937, #0f172a);
      font-family: Segoe UI, Arial, sans-serif;
      color: white;
    }
    .card {
      width: 420px;
      background: rgba(255,255,255,0.06);
      padding: 32px;
      border-radius: 20px;
      box-shadow: 0 0 35px rgba(0,255,255,0.12);
      backdrop-filter: blur(10px);
    }
    h1 {
      margin-top: 0;
      text-align: center;
    }
    label {
      display: block;
      margin: 14px 0 6px;
      font-size: 14px;
      opacity: .9;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.05);
      color: white;
    }
    button {
      width: 100%;
      margin-top: 18px;
      padding: 12px;
      border: 0;
      border-radius: 10px;
      background: linear-gradient(90deg,#00f5ff,#00ff99);
      color: #08111f;
      font-weight: 700;
      cursor: pointer;
    }
    .error {
      margin-top: 12px;
      color: #ff8c8c;
      font-size: 14px;
    }
    .note {
      margin-top: 12px;
      font-size: 12px;
      opacity: .7;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>İlk Kurulum</h1>
    <form method="post">
      <label>İsim</label>
      <input type="text" name="name" placeholder="Örn: Fatih" required>

      <label>TOTP Secret</label>
      <input type="text" name="secret" placeholder="Base32 secret girin" required>

      <button type="submit">Kaydet ve Başla</button>
    </form>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <div class="note">
      Secret yalnızca sizin lokal volume dizininizde saklanır.
    </div>
  </div>
</body>
</html>
